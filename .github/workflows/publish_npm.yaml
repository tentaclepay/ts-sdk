name: Publish @tentaclepay/sdk package to NPM

on:
  workflow_dispatch:

jobs:
  publish-sdk:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@11.15.0 --ignore-scripts

      - name: Configure npm for trusted publishing
        run: npm config delete always-auth 2>/dev/null || true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install and build
        run: |
          bun install --frozen-lockfile --ignore-scripts
          bun run build

      - name: Publish @tentaclepay/sdk package
        run: |
          # Get package information directly
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Package: $PACKAGE_NAME@$PACKAGE_VERSION"

          echo "Publishing to NPM (main branch)"
          npm publish --provenance --access public
